debug_log:
  enabled: true

# Ordered list of CLI agents to try for reviews
cli:
  default_preference:
    - codex
    - claude
    - gemini

  # Recommended settings (see docs/eval-results.md)
  adapters:
    codex:
      allow_tool_use: false
      thinking_budget: low
    claude:
      allow_tool_use: false
      thinking_budget: high
    gemini:
      allow_tool_use: false
      thinking_budget: low

entry_points:
  - path: "."
    checks: []
    reviews:
      - skill-quality
